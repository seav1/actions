name: Bot-Hosting Auto Farm

on:
  schedule:
    - cron: '13 00 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          repository: seav1/bothosting
          token: ${{ secrets.REPO_PAT }}
          ref: main

      - uses: alphaxcv/warp@1.0

      - run: bash run.sh
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}

      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-files
          path: |
            *.png
            error.png
