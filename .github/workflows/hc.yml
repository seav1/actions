name: Harvest hCaptcha Cookie

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: harvest-cookie
  cancel-in-progress: true

jobs:
  harvest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: seav1/hCaptcha
          token: ${{ secrets.REPO_PAT }}
          ref: main

      - run: bash run.sh
        env:
          HCAPTCHA_USER: ${{ secrets.HCAPTCHA_USER }}
          HCAPTCHA_PASS: ${{ secrets.HCAPTCHA_PASS }}
          HEADLESS: "false"
          COOKIE_OUTPUT: hcaptcha_cookie.txt

      - name: Commit and push cookie
        run: |
          cd $GITHUB_WORKSPACE
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.REPO_PAT }}@github.com/${{ secrets.HCAPTCHA_REPO }}
          git add hcaptcha_cookie.txt
          if git diff --cached --quiet; then
            echo "Cookie 无变化，跳过提交。"
          else
            git commit -m "chore: refresh hCaptcha accessibility cookie [skip ci]"
            git push
          fi

      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: "*.png"
