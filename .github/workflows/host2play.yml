name: Host2Play Auto Renew

on:
  schedule:
    - cron: '3 */6 * * *'
  workflow_dispatch:

jobs:
  renew_bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: seav1/host2play
          token: ${{ secrets.REPO_PAT }}
          ref: main

      - run: bash run.sh
        env:
          VLESS_LINK: ${{ secrets.VLESS_LINK }}

      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          retention-days: 1
          path: "*.png"
