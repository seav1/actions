name: Hnhost Login

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

jobs:
  login:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: seav1/hnhost
          token: ${{ secrets.REPO_PAT }}
          ref: main

      - uses: alphaxcv/warp@1.0

      - run: bash run.sh
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          HNHOST_SERVER_IDS: ${{ secrets.HNHOST_SERVER_IDS }}

      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: "*.png"
