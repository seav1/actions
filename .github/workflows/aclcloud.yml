name: Aclcloud Renew

on:
  schedule:
    - cron: '13 20 * * *'
  workflow_dispatch:

jobs:
  renew:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: seav1/aclcloud
          token: ${{ secrets.REPO_PAT }}
          ref: main

      - uses: alphaxcv/warp@1.0

      - run: bash run.sh

      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-artifacts
          path: "*.png"
          if-no-files-found: ignore
