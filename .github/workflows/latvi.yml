name: Latvi Auto Earn

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: seav1/ateex
          token: ${{ secrets.REPO_PAT }}
          ref: main

      - uses: alphaxcv/warp@1.0
      - run: bash run.sh
        env:
          LATVI_EMAIL: ${{ secrets.LATVI_EMAIL }}
          LATVI_PASSWORD: ${{ secrets.LATVI_PASSWORD }}
          
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-screenshot
          path: "*.png"
