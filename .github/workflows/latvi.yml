name: Latvi Auto Earn

on:
  workflow_dispatch:
  
jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          repository: seav1/latvi
          token: ${{ secrets.REPO_PAT }}
          ref: main
          
      - name: Start sing-box
        run: |
          set -euo pipefail
          SINGBOX_VERSION=1.10.0
          curl -fsSL -o /tmp/singbox.tar.gz \
            "https://github.com/SagerNet/sing-box/releases/download/v${SINGBOX_VERSION}/sing-box-${SINGBOX_VERSION}-linux-amd64.tar.gz"
          tar -xzf /tmp/singbox.tar.gz -C /tmp
          sudo install -m 0755 /tmp/sing-box-${SINGBOX_VERSION}-linux-amd64/sing-box /usr/local/bin/sing-box

          python3 - <<'PYEOF'
          import json, os
          from urllib.parse import urlparse, parse_qs, unquote

          link = os.environ["NODE_LINK"].strip()
          def g(q, key, default=""):
              val = q.get(key, [""])[0]
              return val if val else default

          if link.startswith("vless://"):
              u = urlparse(link)
              q = parse_qs(u.query)
              net_type = g(q, "type", "tcp")
              security = g(q, "security", "none")
              outbound = {
                  "type": "vless", "tag": "proxy-out",
                  "server": u.hostname, "server_port": u.port or 443,
                  "uuid": u.username, "flow": g(q, "flow")
              }
              if net_type == "ws":
                  outbound["transport"] = {"type": "ws", "path": g(q, "path", "/"), "headers": {"Host": g(q, "host") or g(q, "sni") or u.hostname}}
              elif net_type == "grpc":
                  outbound["transport"] = {"type": "grpc", "service_name": g(q, "serviceName")}
              if security in ("tls", "reality"):
                  tls = {"enabled": True, "server_name": g(q, "sni", u.hostname), "insecure": g(q, "allowInsecure", "0") in ("1", "true")}
                  if g(q, "fp"): tls["utls"] = {"enabled": True, "fingerprint": g(q, "fp")}
                  if security == "reality": tls["reality"] = {"enabled": True, "public_key": g(q, "pbk"), "short_id": g(q, "sid")}
                  outbound["tls"] = tls
          elif link.startswith("hysteria2://") or link.startswith("hy2://"):
              u = urlparse("hysteria2://" + link.split("://", 1)[1])
              q = parse_qs(u.query)
              outbound = {"type": "hysteria2", "tag": "proxy-out", "server": u.hostname, "server_port": u.port or 443, "password": unquote(u.username or ""), "tls": {"enabled": True, "server_name": g(q, "sni", u.hostname), "insecure": g(q, "insecure", "0") in ("1", "true")}}
              if g(q, "obfs") == "salamander": outbound["obfs"] = {"type": "salamander", "password": g(q, "obfs-password")}

          config = {
              "log": {"level": "error"},
              "dns": {"servers": [{"tag": "dns-direct", "address": "223.5.5.5", "detour": "direct-out"}], "final": "dns-direct"},
              "inbounds": [{"type": "tun", "tag": "tun-in", "interface_name": "tun0", "address": ["172.19.0.1/30"], "mtu": 1280, "auto_route": True, "strict_route": True, "stack": "system", "sniff": True}],
              "outbounds": [outbound, {"type": "direct", "tag": "direct-out"}, {"type": "dns", "tag": "dns-out"}],
              "route": {"auto_detect_interface": True, "rules": [{"protocol": "dns", "outbound": "dns-out"}], "final": "proxy-out"}
          }
          with open("/tmp/singbox-config.json", "w") as f:
              json.dump(config, f)
          PYEOF

          LAN=$(ip route get 1.1.1.1 | grep -oP 'src \K\S+')
          sudo nohup sing-box run -c /tmp/singbox-config.json > /dev/null 2>&1 &
          
          for i in $(seq 1 15); do
            ip addr show tun0 &>/dev/null && break
            sleep 1
          done
          sudo ip rule add priority 100 from "$LAN" lookup main
          
        env:
          NODE_LINK: ${{ secrets.NODE_LINK }}
          
      - run: bash run.sh
        env:
          LATVI_EMAIL: ${{ secrets.LATVI_EMAIL }}
          LATVI_PASSWORD: ${{ secrets.LATVI_PASSWORD }}
          SE_BINARY_PATH: /usr/bin/google-chrome
          
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-screenshot
          path: "*.png"
