name: latvi linkvertise bypass

on:
  workflow_dispatch:

jobs:
  run-task:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y xvfb google-chrome-stable
          pip install seleniumbase curl_cffi

      - name: Run Main Script     
        env:
          LATVI_EMAIL: ${{ secrets.LATVI_EMAIL }}
          LATVI_PASSWORD: ${{ secrets.LATVI_PASSWORD }}
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24 -ac" python linkvertise_earn.py

      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-screenshots
          path: "*.png"
