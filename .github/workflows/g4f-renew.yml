name: G4F Auto Renew

on:
  schedule:
    # 每天北京时间 11:15 运行一次 (UTC 03:15)
    - cron: '15 3 * * *' 
  workflow_dispatch: # 允许手动触发

jobs:
  renew:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout private repository
        uses: actions/checkout@v4
        with:
          repository: your_username/your_private_repo
          token: ${{ secrets.REPO_PAT }}
          ref: main

      - name: Set up WARP (Bypass CF Blocks)
        uses: alphaxcv/warp-on-actions@1.0
        with:
          stack: dual
          mode: wireguard
          
      - name: Execute Run Script
        run: bash run.sh
        env:
          SERVER_NAMES: ${{ secrets.SERVER_NAMES }} 

      - name: Upload Debug Screenshot (Only on Failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: "*.png"
