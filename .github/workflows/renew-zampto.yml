name: Zampto Auto Renew

on:
  workflow_dispatch:

jobs:
  renew:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: seav1/zampto
          token: ${{ secrets.REPO_PAT }}
          ref: main
          
      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          
      - name: Setup proxy
        id: proxy
        uses: alphaxcv/proxy_sb@1.0
        with:
          node_link: ${{ secrets.NODE_LINK }}
          
      - run: bash run.sh
        env:
          LOGIN_EMAIL: ${{ secrets.LOGIN_EMAIL_ZAMPTO }}
          LOGIN_PASSWORD: ${{ secrets.LOGIN_PASSWORD_ZAMPTO }}

      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: zampto-debug-logs
          path: |
            *.png
            *.txt
          retention-days: 3
