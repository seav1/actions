name: Ateex Auto Earn

on:
  schedule:
    - cron: "11 2 * * *"
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: seav1/ateex
          token: ${{ secrets.REPO_PAT }}
          ref: main

      - uses: alphaxcv/warp@1.0

      - run: bash run.sh
        env:
          ATEEX_EMAIL: ${{ secrets.ATEEX_EMAIL }}
          ATEEX_PASSWORD: ${{ secrets.ATEEX_PASSWORD }}
          SE_BINARY_PATH: /usr/bin/google-chrome

      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-screenshot
          path: "*.png"
