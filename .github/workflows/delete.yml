name: Clear Actions Run History

on:
  schedule:
    - cron: '3 22 * * *'
  workflow_dispatch:

jobs:
  clear:
    runs-on: ubuntu-latest
    permissions:
      actions: write

    steps:
      - name: Delete workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 0
