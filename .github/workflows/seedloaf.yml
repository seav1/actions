name: Seedloaf World Keeper

on:
  schedule:
    - cron: '17 2 * * *'
  workflow_dispatch:

concurrency:
  group: seedloaf-world-keeper
  cancel-in-progress: false

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          repository: seav1/seedloaf
          token: ${{ secrets.REPO_PAT }}
          ref: main

      - run: bash run.sh
        env:
          SEEDLOAF_EMAIL: ${{ secrets.SEEDLOAF_EMAIL }}
          SEEDLOAF_PASSWORD: ${{ secrets.SEEDLOAF_PASSWORD }}

      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: "*.png"
          if-no-files-found: ignore
