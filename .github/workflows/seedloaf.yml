name: Seedloaf World Keeper

on:
  workflow_dispatch:

concurrency:
  group: seedloaf-world-keeper
  cancel-in-progress: false

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          repository: seav1/seedloaf
          token: ${{ secrets.REPO_PAT }}
          ref: main

      - run: bash run.sh
        env:
          DISCORD_EMAIL: ${{ secrets.DISCORD_EMAIL2 }}
          DISCORD_PASSWORD: ${{ secrets.DISCORD_PASSWORD2 }}
          SOCKS5_PROXY: ${{ secrets.SOCKS5_PROXY }}

      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: "*.png"
          if-no-files-found: ignore
