name: SlimeNodes Coin Farm

on:
  schedule:
    - cron: '13 20 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: seav1/slimenodes
          token: ${{ secrets.REPO_PAT }}
          ref: main

      - uses: alphaxcv/warp@1.0

      - run: bash run.sh
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          HEADLESS: "true"

      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-files
          path: "*.png"
